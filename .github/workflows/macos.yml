name: macOS Build Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cython yt-dlp av
        brew install deno  # yt-dlp JS runtime

    - name: Run Build (Cython)
      run: |
        chmod +x py2c
        ./py2c build

    - name: Verify Binary
      run: |
        ls -l releases/yt-audio
        file releases/yt-audio
        ./releases/yt-audio -h

    - name: Test Download (macOS)
      run: |
        mkdir -p test
        # Try a simple download with more verbose output
        ./releases/yt-audio "https://www.youtube.com/shorts/90QzZtIM0mc" -o test/mac_test.wav --verbose || true
        
        if [ -f "test/mac_test.wav" ]; then
          echo "DOWNLOAD_RESULT=SUCCESS" >> $GITHUB_ENV
          echo "Download successful."
        else
          echo "DOWNLOAD_RESULT=FAILURE" >> $GITHUB_ENV
          echo "Download failed."
          # Print diagnostic info
          ls -R test
        fi

    - name: Generate Final Log
      if: always()
      run: |
        echo "==============================" > final.log
        echo "MACOS BUILD & TEST LOG" >> final.log
        echo "==============================" >> final.log
        # We don't have build.log anymore since we didn't redirect, 
        # but the standard GH Action logs will have it.
        echo "TEST DOWNLOAD STATUS: ${{ env.DOWNLOAD_RESULT }}" >> final.log
        echo "==============================" >> final.log

    - name: Upload Build Log
      uses: actions/upload-artifact@v4
      with:
        name: macos-build-and-test-log
        path: final.log

    - name: Check Status
      run: |
        if [ "${{ env.RESULT }}" == "FAILURE" ] || [ "${{ env.DOWNLOAD_RESULT }}" == "FAILURE" ]; then
          exit 1
        fi
