name: macOS Build Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cython yt-dlp av
        brew install deno  # yt-dlp JS runtime

    - name: Verify Environment
      run: |
        python --version
        yt-dlp --version
        python -c "import av; print(f'PyAV: {av.__version__}')"

    - name: Run Build (Cython)
      run: |
        rm -rf build releases
        chmod +x py2c
        if ./py2c build; then
          echo "BUILD_RESULT=SUCCESS" >> $GITHUB_ENV
        else
          echo "BUILD_RESULT=FAILURE" >> $GITHUB_ENV
          exit 1
        fi

    - name: Verify Binary
      run: |
        ls -l releases/yt-audio
        file releases/yt-audio
        ./releases/yt-audio --help

    - name: Test Download (via Python source)
      # Tests the full app logic: yt-dlp + PyAV + argument parsing.
      run: |
        mkdir -p test
        python3 src/main.py "https://www.youtube.com/watch?v=dQw4w9WgXcQ" -o test/mac_test.wav
        echo "DOWNLOAD_RESULT=SUCCESS" >> $GITHUB_ENV

    - name: Test Compiled Binary (macOS)
      # Point the binary's setup_environment() to the runner's site-packages
      # by creating a 'venv' symlink that matches the expected directory structure.
      run: |
        PYTHON_PREFIX=$(python3 -c "import sys; print(sys.prefix)")
        echo "Linking venv -> $PYTHON_PREFIX"
        ln -sf "$PYTHON_PREFIX" venv
        
        ./releases/yt-audio "https://www.youtube.com/watch?v=dQw4w9WgXcQ" -o test/mac_test_binary.wav
        echo "BINARY_RESULT=SUCCESS" >> $GITHUB_ENV

    - name: Upload Audio Output
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: macos-audio-output
        path: |
          test/mac_test.wav
          test/mac_test_binary.wav
        if-no-files-found: warn

    - name: Generate Final Log
      if: always()
      run: |
        echo "==============================" > final.log
        echo "MACOS BUILD & TEST SUMMARY" >> final.log
        echo "==============================" >> final.log
        echo "BUILD STATUS:    ${BUILD_RESULT:-NOT_RUN}" >> final.log
        echo "DOWNLOAD STATUS: ${DOWNLOAD_RESULT:-NOT_RUN}" >> final.log
        echo "BINARY STATUS:   ${BINARY_RESULT:-NOT_RUN}" >> final.log
        echo "==============================" >> final.log

    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: macos-build-summary
        path: final.log
