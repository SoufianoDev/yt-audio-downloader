name: macOS Build Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cython yt-dlp av
        brew install deno  # yt-dlp JS runtime

    - name: Run Build (Cython)
      id: run_build
      run: |
        rm -rf build releases
        chmod +x py2c
        if ./py2c build; then
          echo "BUILD_RESULT=SUCCESS" >> $GITHUB_ENV
        else
          echo "BUILD_RESULT=FAILURE" >> $GITHUB_ENV
          exit 1
        fi

    - name: Verify Binary
      run: |
        ls -l releases/yt-audio
        file releases/yt-audio
        ./releases/yt-audio -h

    - name: Test Download (macOS)
      run: |
        mkdir -p test
        # Try a simple download with verbose output to console
        if ./releases/yt-audio "https://www.youtube.com/shorts/90QzZtIM0mc" -o test/mac_test.wav --verbose; then
          echo "DOWNLOAD_RESULT=SUCCESS" >> $GITHUB_ENV
        else
          echo "DOWNLOAD_RESULT=FAILURE" >> $GITHUB_ENV
          ls -R test
        fi

    - name: Generate Final Log
      if: always()
      run: |
        echo "==============================" > final.log
        echo "MACOS BUILD & TEST SUMMARY" >> final.log
        echo "==============================" >> final.log
        echo "BUILD STATUS: ${{ env.BUILD_RESULT || 'NOT_RUN' }}" >> final.log
        echo "DOWNLOAD STATUS: ${{ env.DOWNLOAD_RESULT || 'NOT_RUN' }}" >> final.log
        echo "==============================" >> final.log

    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: macos-build-summary
        path: final.log

    - name: Check Status
      if: always()
      run: |
        if [ "${{ env.BUILD_RESULT }}" != "SUCCESS" ] || [ "${{ env.DOWNLOAD_RESULT }}" != "SUCCESS" ]; then
          echo "Overall validation failed."
          exit 1
        fi
