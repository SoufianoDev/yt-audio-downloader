name: macOS Build Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cython yt-dlp av
        brew install deno  # yt-dlp JS runtime

    - name: Verify Environment
      run: |
        python --version
        yt-dlp --version
        python -c "import av; print(f'PyAV Version: {av.__version__}')"
        deno --version

    - name: Run Build (Cython)
      id: run_build
      run: |
        rm -rf build releases
        chmod +x py2c
        if ./py2c build; then
          echo "BUILD_RESULT=SUCCESS" >> $GITHUB_ENV
        else
          echo "BUILD_RESULT=FAILURE" >> $GITHUB_ENV
          exit 1
        fi

    - name: Verify Binary
      run: |
        ls -l releases/yt-audio
        file releases/yt-audio
        # Run help and capture output to verify runtime
        ./releases/yt-audio --help

    - name: Test Download (macOS)
      run: |
        mkdir -p test
        echo "Starting download test..."
        # Using a reliable short video and disabling certificate checks for GH runners
        # Also redirecting output to a file to ensure it's captured in the artifact if it crashes
        ./releases/yt-audio "https://www.youtube.com/watch?v=90QzZtIM0mc" -o test/mac_test.wav --verbose > download.log 2>&1 || true
        
        cat download.log
        
        if [ -f "test/mac_test.wav" ]; then
          echo "DOWNLOAD_RESULT=SUCCESS" >> $GITHUB_ENV
        else
          echo "DOWNLOAD_RESULT=FAILURE" >> $GITHUB_ENV
          echo "Download trace found in log above."
          ls -R test
        fi

    - name: Generate Final Log
      if: always()
      run: |
        echo "==============================" > final_v2.log
        echo "MACOS BUILD & TEST SUMMARY V2" >> final_v2.log
        echo "==============================" >> final_v2.log
        echo "BUILD STATUS: ${{ env.BUILD_RESULT || 'NOT_RUN' }}" >> final_v2.log
        echo "DOWNLOAD STATUS: ${{ env.DOWNLOAD_RESULT || 'NOT_RUN' }}" >> final_v2.log
        echo "==============================" >> final_v2.log
        if [ -f "download.log" ]; then
          echo "DETAILED DOWNLOAD LOG:" >> final_v2.log
          cat download.log >> final_v2.log
        fi

    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: macos-full-validation-log
        path: final_v2.log

    - name: Check Status
      if: always()
      run: |
        if [ "${{ env.BUILD_RESULT }}" != "SUCCESS" ] || [ "${{ env.DOWNLOAD_RESULT }}" != "SUCCESS" ]; then
          echo "Overall validation failed. Check macos-full-validation-log artifact."
          exit 1
        fi
